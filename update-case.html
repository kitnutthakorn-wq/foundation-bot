<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>อัปเดตเคส | Team Workspace</title>
  <style>
    :root{
      --brand:#0f7f8f;
      --brand-dark:#173f73;
      --line:#d9e3ea;
      --bg:#eef3f6;
      --card:#ffffff;
      --text:#17324d;
      --muted:#6f8092;
      --success:#22a35a;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:18px;
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      box-shadow:0 8px 20px rgba(20,40,60,.06);
    }

    h1{
      margin:0 0 8px;
      font-size:24px;
    }

    .sub{
      color:var(--muted);
      margin-bottom:18px;
    }

    .case-meta{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:16px;
    }

    .meta-box{
      background:#f7fafc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
    }

    .meta-label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .meta-value{
      font-size:16px;
      font-weight:700;
    }

    .field{
      margin-bottom:16px;
    }

    label{
      display:block;
      font-weight:700;
      margin-bottom:8px;
    }

    textarea,
    input[type="file"]{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      font-size:16px;
      background:#fff;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      min-height:46px;
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(90deg,var(--brand),var(--brand-dark));
      color:#fff;
    }

    .btn-secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .status{
      margin-top:14px;
      font-size:14px;
      color:var(--muted);
      white-space:pre-line;
    }

    .status.ok{
      color:var(--success);
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>อัปเดตเคส</h1>
      <div class="sub">สำหรับทีมงานภาคสนาม ใช้ส่งความคืบหน้า รูปภาพ และรายละเอียดของงาน</div>

      <div class="case-meta">
        <div class="meta-box">
          <div class="meta-label">Case ID</div>
          <div class="meta-value" id="caseIdText">-</div>
        </div>
        <div class="meta-box">
          <div class="meta-label">เลขเคส</div>
          <div class="meta-value" id="caseCodeText">-</div>
        </div>
      </div>

      <div class="field">
        <label for="updateMessage">รายละเอียดอัปเดต</label>
        <textarea id="updateMessage" placeholder="เช่น ลงพื้นที่แล้ว พบผู้ประสบปัญหาเรียบร้อย กำลังรวบรวมข้อมูลและประเมินความช่วยเหลือ..."></textarea>
      </div>

      <div class="field">
        <label for="updateImage">แนบรูปภาพ (ยังไม่บังคับ)</label>
        <input type="file" id="updateImage" accept="image/*" />
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="submitCaseUpdate()">ส่งอัปเดตเคส</button>
        <button class="btn-secondary" onclick="goBack()">ย้อนกลับ</button>
      </div>

      <div id="statusBox" class="status"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const caseId = params.get("caseId") || "";
    const caseCode = params.get("caseCode") || "";

    document.getElementById("caseIdText").textContent = caseId || "-";
    document.getElementById("caseCodeText").textContent = caseCode || "-";

    function setStatus(message, ok = false) {
      const box = document.getElementById("statusBox");
      box.textContent = message;
      box.className = ok ? "status ok" : "status";
    }

    function goBack() {
      history.back();
    }

    async function submitCaseUpdate() {
      const message = document.getElementById("updateMessage").value.trim();
      const fileInput = document.getElementById("updateImage");
      const file = fileInput.files[0] || null;

      if (!caseId) {
        setStatus("ไม่พบ caseId");
        return;
      }

      if (!message && !file) {
        setStatus("กรุณากรอกรายละเอียด หรือแนบรูปอย่างน้อย 1 อย่าง");
        return;
      }

      try {
        setStatus("กำลังส่งข้อมูล...");

        const formData = new FormData();
        formData.append("case_id", caseId);
        formData.append("case_code", caseCode);
        formData.append("message", message);
        if (file) {
          formData.append("image", file);
        }

        const res = await fetch("/api/case-updates", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "ไม่สามารถบันทึกข้อมูลได้");
        }

        setStatus("ส่งอัปเดตเคสเรียบร้อยแล้ว", true);
        document.getElementById("updateMessage").value = "";
        document.getElementById("updateImage").value = "";
      } catch (err) {
        setStatus("เกิดข้อผิดพลาด: " + err.message);
      }
    }
  </script>
</body>
</html>
