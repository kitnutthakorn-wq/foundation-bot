<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War Room Card Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Prompt', sans-serif;
      background:
        radial-gradient(circle at top, rgba(35,87,107,.75), transparent 35%),
        radial-gradient(circle at bottom, rgba(255,81,0,.18), transparent 20%),
        linear-gradient(180deg, #0d1f29 0%, #04070d 100%);
      color: #fff;
    }

    .warroom-shell {
      width: min(100%, 430px);
      border-radius: 28px;
      padding: 18px 18px 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        linear-gradient(180deg, #0d1b28 0%, #05090f 100%);
      box-shadow:
        0 22px 50px rgba(0,0,0,.55),
        inset 0 0 0 1px rgba(255,255,255,.12),
        0 0 0 2px rgba(96, 196, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .warroom-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,214,102,.22), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255,102,0,.2), transparent 18%),
        radial-gradient(circle at 0% 50%, rgba(0,170,255,.15), transparent 18%),
        radial-gradient(circle at 100% 50%, rgba(255,70,70,.12), transparent 18%);
      pointer-events: none;
    }

    .title {
      position: relative;
      margin: 4px 0 18px;
      text-align: center;
      font-size: clamp(34px, 8vw, 56px);
      line-height: 0.95;
      font-weight: 800;
      color: #f8fbff;
      letter-spacing: -1px;
      text-shadow:
        0 2px 0 rgba(0,0,0,.55),
        0 6px 16px rgba(0,0,0,.35);
    }

    .card {
      position: relative;
      z-index: 1;
      background: #f5f5f5;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 14px 28px rgba(0,0,0,.35),
        inset 0 0 0 1px rgba(255,255,255,.65);
    }

    .card-header {
      background: linear-gradient(180deg, #ff2820 0%, #e90f0f 100%);
      color: #fff;
      text-align: center;
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 800;
      padding: 18px 16px 16px;
      text-shadow: 0 2px 8px rgba(0,0,0,.28);
    }

    .card-body {
      padding: 26px 24px 22px;
      color: #252525;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
      font-size: 18px;
      line-height: 1.35;
    }

    .label {
      min-width: 78px;
      color: #555;
    }

    .value {
      font-weight: 600;
      color: #202020;
      flex: 1;
    }

    .status {
      color: #e57b00;
      font-weight: 700;
    }

    .priority {
      color: #e11d1d;
      font-weight: 800;
    }

    .divider {
      height: 1px;
      background: #dedede;
      margin: 16px 0 14px;
      border: 0;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #555;
      font-size: 17px;
      margin-bottom: 14px;
    }

    .sla-box {
      background: linear-gradient(180deg, #ffffff, #f2f2f2);
      border-radius: 18px;
      padding: 14px 16px 16px;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.06),
        0 8px 18px rgba(0,0,0,.10);
    }

    .sla-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .sla-left {
      color: #d97706;
    }

    .percent {
      color: #202020;
      font-size: 18px;
      font-weight: 800;
    }

    .progress-track {
      height: 16px;
      border-radius: 999px;
      background: #7b7b62;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 5px rgba(0,0,0,.22);
    }

    .progress-bar {
      width: 60%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd000 0%, #c9f218 48%, #55d14f 100%);
      box-shadow: 0 0 12px rgba(255,214,10,.8);
      position: relative;
    }

    .progress-bar::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -8px;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: #fff67d;
      box-shadow: 0 0 14px rgba(255,230,0,.95);
    }

    .btn {
      display: block;
      width: calc(100% - 24px);
      margin: 16px auto 0;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-family: 'Prompt', sans-serif;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      text-shadow: 0 1px 3px rgba(0,0,0,.25);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.25),
        0 8px 18px rgba(0,0,0,.30);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.25),
        0 12px 22px rgba(0,0,0,.34);
    }

    .btn-track {
      background: linear-gradient(180deg, #138ca0 0%, #0c6f83 100%);
    }

    .btn-open {
      background: linear-gradient(180deg, #ff2018 0%, #d30a0a 100%);
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      text-align: center;
      color: rgba(255,255,255,.82);
      font-size: 12px;
      letter-spacing: .2px;
    }

    @media (max-width: 420px) {
      .card-body { padding: 22px 18px 18px; }
      .label { min-width: 64px; }
      .row { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="warroom-shell">
    <div class="title">ศูนย์ปฏิบัติการเคส</div>

    <section class="card">
      <div class="card-header" id="caseCodeText">กำลังโหลด...</div>
      <div class="card-body">
       <div class="row">
  <div class="label">ชื่อ:</div>
  <div class="value" id="caseFullName">-</div>
</div>

<div class="row">
  <div class="label">พื้นที่:</div>
  <div class="value" id="caseLocation">-</div>
</div>

<div class="row">
  <div class="label">สถานะ:</div>
  <div class="value status" id="caseStatus">-</div>
</div>

<div class="row">
  <div class="label">ระดับ:</div>
  <div class="value priority" id="casePriority">-</div>
</div>

<hr class="divider" />

<div class="meta">🕒 <span id="caseUpdatedAt">อัปเดตล่าสุด: -</span></div>

<div class="sla-box">
  <div class="sla-top">
    <div class="sla-left" id="caseSlaText">⚠ SLA: -</div>
    <div class="percent" id="caseProgressText">0%</div>
  </div>
  <div class="progress-track">
    <div class="progress-bar" id="caseProgressBar" style="width:0%"></div>
  </div>
</div>      </div>
    </section>

    <button class="btn btn-track" type="button">ติดตามเคสนี้</button>
    <button class="btn btn-open" type="button">เปิดศูนย์ปฏิบัติการ</button>

    <div class="footer">มูลนิธิคนช่วยฅน</div>
  </main>
</body>
</html>
