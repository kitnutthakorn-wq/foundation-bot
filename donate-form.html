
<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>หน้าบริจาค | Golden ProMax</title>
<style>:root{--bg:#edf2f5;--card:#fff;--line:#dbe3ea;--text:#16324f;--muted:#6b7280;--brand:#1ea644;--blue:#2f64e3;--shadow:0 12px 30px rgba(18,36,58,.10)}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}.page{max-width:760px;margin:0 auto;padding:16px 12px 32px}.shell{background:var(--card);border-radius:26px;box-shadow:var(--shadow);padding:28px 28px 22px;border:1px solid rgba(219,227,234,.85)}.back{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:12px;background:var(--blue);color:#fff;text-decoration:none;font-weight:700;margin-bottom:18px}.title{text-align:center;font-size:26px;font-weight:800;line-height:1.3}.province{text-align:center;color:var(--muted);margin-top:10px;font-size:17px}.money{text-align:center;font-size:18px;margin-top:14px}.bar{height:18px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin:18px 0}.fill{height:100%;background:linear-gradient(90deg,#1fc64a,#19a841)}.section-title{text-align:center;font-size:18px;font-weight:800;margin:18px 0 12px}.presets{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}.preset{min-width:106px;min-height:42px;padding:0 16px;border:none;border-radius:12px;background:var(--brand);color:#fff;font-size:16px;font-weight:800;cursor:pointer}.field{margin-top:14px}.field input,.field textarea{width:100%;min-height:46px;border:1px solid #cfd8e3;border-radius:10px;padding:0 14px;font-size:16px;background:#fff}.field textarea{min-height:84px;padding-top:12px;resize:vertical}.apply{display:flex;justify-content:center;margin-top:12px}.apply button{min-width:130px;min-height:44px;border-radius:12px;border:1px solid var(--brand);background:#fff;color:var(--brand);font-size:16px;font-weight:800;cursor:pointer}.qr-wrap{text-align:center;margin:22px 0 10px}.qr{width:220px;height:220px;border:10px solid #fff;box-shadow:0 0 0 1px #dfe6ef inset;background:#fff;object-fit:contain}.qr-box{width:220px;height:220px;display:inline-flex;align-items:center;justify-content:center;background:#fff;border:10px solid #fff;box-shadow:0 0 0 1px #dfe6ef inset;font-weight:700;color:#475569}.note{text-align:center;color:var(--muted);margin-top:8px;line-height:1.6}.checkbox-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;font-size:16px;flex-wrap:wrap}.submit-row{display:flex;justify-content:center;margin:20px 0}.submit-btn{min-width:120px;min-height:46px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:18px;font-weight:800;cursor:pointer}.recent{margin-top:24px;background:#fafcfe;border:1px solid var(--line);border-radius:18px;padding:16px}.recent h3{margin:0 0 12px;font-size:18px}.recent-item{padding:10px 0;border-top:1px solid #edf2f7}.recent-item:first-of-type{border-top:none}.message{display:none;margin-top:14px;padding:12px 14px;border-radius:12px;text-align:center}.message.show{display:block}.message.ok{background:#dcfce7;color:#166534}.message.err{background:#fee2e2;color:#b91c1c}@media (max-width:640px){.page{padding:10px 8px 20px}.shell{padding:18px 14px 16px}.title{font-size:22px}.province,.money{font-size:15px}.presets{gap:10px}.preset{min-width:95px;font-size:15px}.qr,.qr-box{width:200px;height:200px}}</style>
</head><body><div class="page"><div class="shell"><a class="back" id="backLink" href="donate-cases.html">← กลับไปหน้าเคส</a><div class="title" id="caseTitle">กำลังโหลดเคส</div><div class="province" id="provinceText">-</div><div class="money" id="moneyText">-</div><div class="bar"><div class="fill" id="fillBar" style="width:0%"></div></div><div class="section-title">เลือกจำนวนเงิน</div><div class="presets" id="presetButtons"></div><div class="section-title" style="margin-top:6px;">หรือระบุจำนวนเงินด้วยตนเอง</div><div class="field"><input id="amountInput" type="number" min="1" placeholder="ระบุจำนวนเงิน เช่น 1500"></div><div class="apply"><button id="applyAmountBtn">ใช้ยอดนี้</button></div><div class="qr-wrap"><img id="qrImage" class="qr" alt="QR สำหรับบริจาค" style="display:none" /><div id="qrFallback" class="qr-box">QR พร้อมเชื่อมภายหลัง</div><div class="note">สแกน QR เพื่อโอนเงิน<br>โอนแล้วกรอกข้อมูลด้านล่าง</div></div><form id="donationForm"><div class="field"><input id="donorName" name="donor_name" type="text" placeholder="ชื่อผู้บริจาค" /></div><div class="checkbox-row"><input id="anonymousCheck" name="is_anonymous" type="checkbox" /><label for="anonymousCheck">ไม่ประสงค์เอ่ยนาม</label></div><div class="field"><input id="amountConfirm" name="amount" type="number" min="1" placeholder="จำนวนเงิน" required /></div><div class="field"><input id="slipInput" name="slip" type="file" accept="image/*" /></div><div class="field"><textarea id="noteInput" name="note" placeholder="หมายเหตุ (ถ้ามี)"></textarea></div><div class="submit-row"><button class="submit-btn" type="submit">ส่งข้อมูล</button></div><div id="formMessage" class="message"></div></form><div class="recent"><h3>ผู้บริจาคล่าสุดของเคสนี้</h3><div id="recentList"><div class="recent-item">กำลังโหลดข้อมูล...</div></div></div></div></div>
<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const caseKey = params.get('caseId') || '';
  console.log("CASE ID FROM URL:", caseKey);
  const projectSlug = params.get('project') || '';
  const money = n => `${Number(n || 0).toLocaleString('th-TH')} บาท`;
  const moneyNumber = n => Number(n || 0).toLocaleString('th-TH');
  const backLink = document.getElementById('backLink');
  backLink.href = `donate-cases.html?project=${encodeURIComponent(projectSlug)}`;
  let currentCase = null;
  function setAmount(value){ document.getElementById('amountInput').value = value || ''; document.getElementById('amountConfirm').value = value || ''; }
  document.getElementById('applyAmountBtn').addEventListener('click', () => setAmount(document.getElementById('amountInput').value));
  async function loadCase(){
    const res = await fetch(`/api/donations/cases/${encodeURIComponent(caseKey)}`); const json = await res.json(); if (!res.ok || !json.ok) throw new Error(json.error || 'โหลดเคสไม่สำเร็จ');
    currentCase = json.item; const item = currentCase; const percent = Math.max(0, Math.min(100, Math.round((Number(item.raised_amount||0)/Math.max(Number(item.target_amount||0),1))*100)));
    document.getElementById('caseTitle').textContent = item.title || '-'; document.getElementById('provinceText').textContent = item.province || '-'; document.getElementById('moneyText').textContent = `ช่วยแล้ว ${moneyNumber(item.raised_amount)} / ${moneyNumber(item.target_amount)} บาท (${percent}%)`; document.getElementById('fillBar').style.width = `${percent}%`;
    const presetWrap = document.getElementById('presetButtons');
    presetWrap.innerHTML = (json.presets || [100,300,500]).map(v => `<button class="preset" type="button" data-value="${v}">บริจาค ${v}</button>`).join('');
    presetWrap.querySelectorAll('.preset').forEach(btn => btn.addEventListener('click', ()=>setAmount(btn.dataset.value)));
    const qrImage = document.getElementById('qrImage'); const qrFallback = document.getElementById('qrFallback');
    if (json.qr_image) { qrImage.src = json.qr_image; qrImage.style.display='inline-block'; qrFallback.style.display='none'; }
  }
  async function loadRecent(){
    const res = await fetch(`/api/donations/cases/${encodeURIComponent(caseKey)}/recent?limit=8`); const json = await res.json(); const items = json.items || [];
    document.getElementById('recentList').innerHTML = items.length ? items.map(item => `<div class="recent-item"><strong>${item.donor_name}</strong> — ${money(item.amount)}</div>`).join('') : '<div class="recent-item">ยังไม่มีผู้บริจาคล่าสุด</div>';
  }
  function showMessage(type, text){ const el=document.getElementById('formMessage'); el.className=`message show ${type}`; el.textContent=text; }
  document.getElementById('donationForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData();
    fd.append('case_id', caseKey);
    fd.append('donor_name', document.getElementById('donorName').value || '');
    fd.append('is_anonymous', document.getElementById('anonymousCheck').checked ? 'true' : 'false');
    fd.append('amount', document.getElementById('amountConfirm').value || '0');
    fd.append('note', document.getElementById('noteInput').value || '');
    const slip = document.getElementById('slipInput').files[0]; if (slip) fd.append('slip', slip);
    try { const res = await fetch('/api/donations/submit', { method:'POST', body:fd }); const json = await res.json(); if (!res.ok || !json.ok) throw new Error(json.error || 'ส่งข้อมูลไม่สำเร็จ'); showMessage('ok', json.message || 'รับข้อมูลการบริจาคแล้ว'); e.target.reset(); setAmount(''); await loadRecent(); }
    catch (err) { console.error(err); showMessage('err', err.message || 'ส่งข้อมูลไม่สำเร็จ'); }
  });
  try { await loadCase(); await loadRecent(); } catch (err) { console.error(err); document.getElementById('caseTitle').textContent='โหลดข้อมูลไม่สำเร็จ'; showMessage('err', err.message || 'โหลดข้อมูลไม่สำเร็จ'); }
})();
</script></body></html>
