<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จัดการบริจาค | Donation ProMax</title>
  <style>
    :root{
      --bg:#edf2f5;--card:#fff;--line:#dbe3ea;--text:#16324f;--muted:#6b7280;
      --brand:#19a84a;--brand-dark:#0b7c86;--blue:#2f64e3;--warn:#f59e0b;--danger:#dc2626;
      --shadow:0 12px 30px rgba(18,36,58,.10);--radius:24px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .page{max-width:1320px;margin:0 auto;padding:24px 16px 40px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    h1{margin:0;font-size:28px}
    .sub{margin-top:8px;color:var(--muted)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 16px;border:none;border-radius:12px;background:var(--brand);color:#fff;text-decoration:none;font-weight:800;cursor:pointer}
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    .btn.danger{background:var(--danger)}
    .toolbar{display:grid;grid-template-columns:1.2fr .8fr .8fr auto;gap:12px;margin-bottom:18px}
    .toolbar input,.toolbar select{width:100%;min-height:44px;border:1px solid #cfd8e3;border-radius:12px;padding:0 14px;font-size:15px;background:#fff}
    .card{background:var(--card);border:1px solid rgba(219,227,234,.85);border-radius:22px;box-shadow:var(--shadow)}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:14px 12px;border-bottom:1px solid #edf2f7;vertical-align:top;font-size:15px}
    th{font-size:14px;color:#374151}
    .badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700}
    .approved{background:#dcfce7;color:#166534}
    .pending{background:#fef3c7;color:#92400e}
    .rejected{background:#fee2e2;color:#b91c1c}
    .action-row{display:flex;gap:8px;flex-wrap:wrap}
    .sm-btn{min-height:36px;padding:0 12px;border:none;border-radius:10px;font-weight:700;cursor:pointer}
    .sm-btn.approve{background:#16a34a;color:#fff}
    .sm-btn.reject{background:#ef4444;color:#fff}
    .sm-btn.ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
    .link{color:#2f64e3;text-decoration:none;font-weight:700}
    .mobile-list{display:none;gap:12px}
    .donation-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
    .donation-card h3{margin:0 0 10px;font-size:22px}
    .donation-meta{display:grid;gap:8px;color:#374151}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}
    .modal.open{display:flex}
    .modal-box{background:#fff;border-radius:20px;max-width:720px;width:100%;padding:16px;box-shadow:var(--shadow)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .modal-img{width:100%;max-height:70vh;object-fit:contain;border-radius:14px;background:#f8fafc;border:1px solid var(--line)}
    .empty{padding:22px;text-align:center;color:var(--muted)}
    @media (max-width:920px){.toolbar{grid-template-columns:1fr 1fr}}
    @media (max-width:720px){
      .page{padding:16px 10px 24px}
      h1{font-size:23px}
      .toolbar{grid-template-columns:1fr}
      .desktop-table{display:none}
      .mobile-list{display:grid}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div>
        <h1>จัดการบริจาค</h1>
        <div class="sub">ตรวจสอบรายการบริจาค ดูสลิป และจัดการสถานะรายการ</div>
      </div>
      <div class="actions">
        <a class="btn secondary" href="donate-dashboard.html">กลับหน้า Dashboard บริจาค</a>
        <a class="btn secondary" href="donate-projects.html">กลับหน้าเมนูบริจาค</a>
      </div>
    </div>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="ค้นหาชื่อผู้บริจาค / จำนวนเงิน / สถานะ" />
      <select id="statusFilter">
        <option value="">ทุกสถานะ</option>
        <option value="pending">pending</option>
        <option value="approved">approved</option>
        <option value="rejected">rejected</option>
      </select>
      <select id="slipFilter">
        <option value="">ทุกประเภทสลิป</option>
        <option value="has">มีสลิป</option>
        <option value="none">ไม่มีสลิป</option>
      </select>
      <button class="btn" id="reloadBtn">รีเฟรช</button>
    </div>

    <div class="card desktop-table">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ชื่อผู้บริจาค</th>
              <th>จำนวนเงิน</th>
              <th>สถานะ</th>
              <th>สลิป</th>
              <th>จัดการ</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5" class="empty">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="mobile-list" id="mobileList"></div>
  </div>

  <div class="modal" id="slipModal">
    <div class="modal-box">
      <div class="modal-head">
        <strong>ดูสลิปการโอน</strong>
        <button class="sm-btn ghost" id="closeModalBtn">ปิด</button>
      </div>
      <img id="slipImage" class="modal-img" alt="slip preview" />
    </div>
  </div>

<script src="mock-data.js"></script>
<script>
(function(){
  const state = { rows: [] };
  const money = n => `${Number(n || 0).toLocaleString('th-TH')} บาท`;
  const statusClass = s => String(s||'pending').toLowerCase();
  const modal = document.getElementById('slipModal');
  const slipImage = document.getElementById('slipImage');

  function demoRows(){
    return [
      { id:1, donor_name:'KCK2', amount:15000, payment_status:'approved', slip_url:'https://dummyimage.com/960x1400/f3f4f6/0f172a&text=Slip+Preview+1' },
      { id:2, donor_name:'KCK_Test', amount:10000, payment_status:'approved', slip_url:'https://dummyimage.com/960x1400/f8fafc/0f172a&text=Slip+Preview+2' },
      { id:3, donor_name:'ผู้ไม่ประสงค์เอ่ยนาม', amount:500, payment_status:'approved', slip_url:'https://dummyimage.com/960x1400/f1f5f9/0f172a&text=Slip+Preview+3', is_anonymous:true },
      { id:4, donor_name:'ผู้ไม่ประสงค์เอ่ยนาม', amount:10000, payment_status:'approved', slip_url:'https://dummyimage.com/960x1400/e2e8f0/0f172a&text=Slip+Preview+4', is_anonymous:true },
      { id:5, donor_name:'kck', amount:500, payment_status:'pending', slip_url:null },
      { id:6, donor_name:'kck', amount:500, payment_status:'pending', slip_url:null },
      { id:7, donor_name:'uyuu', amount:100, payment_status:'pending', slip_url:'https://dummyimage.com/960x1400/f8fafc/0f172a&text=Slip+Preview+5' }
    ];
  }

  async function loadRows(){
    let rows = null;
    try {
      const res = await fetch('/api/donations/admin-list', { credentials:'same-origin' });
      if (res.ok) {
        const json = await res.json();
        if (json && (json.ok || json.success)) rows = json.items || json.data || [];
      }
    } catch (_) {}
    state.rows = Array.isArray(rows) && rows.length ? rows : demoRows();
    render();
  }

  function currentRows(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const status = document.getElementById('statusFilter').value;
    const slip = document.getElementById('slipFilter').value;
    return state.rows.filter(item => {
      const hay = [item.donor_name, item.amount, item.payment_status].join(' ').toLowerCase();
      if (q && !hay.includes(q)) return false;
      if (status && String(item.payment_status || '') !== status) return false;
      if (slip === 'has' && !item.slip_url) return false;
      if (slip === 'none' && item.slip_url) return false;
      return true;
    });
  }

  function render(){
    const rows = currentRows();
    const tableBody = document.getElementById('tableBody');
    const mobileList = document.getElementById('mobileList');

    tableBody.innerHTML = rows.length ? rows.map(item => `
      <tr>
        <td>${item.is_anonymous ? 'ผู้ไม่ประสงค์เอ่ยนาม' : (item.donor_name || '-')}</td>
        <td>${money(item.amount || 0)}</td>
        <td><span class="badge ${statusClass(item.payment_status)}">${item.payment_status || '-'}</span></td>
        <td>${item.slip_url ? `<a class="link" href="#" data-slip="${item.slip_url}">ดูสลิป</a>` : '-'}</td>
        <td>
          <div class="action-row">
            <button class="sm-btn approve" data-action="approve" data-id="${item.id}">อนุมัติ</button>
            <button class="sm-btn reject" data-action="reject" data-id="${item.id}">ปฏิเสธ</button>
          </div>
        </td>
      </tr>
    `).join('') : '<tr><td colspan="5" class="empty">ไม่พบรายการที่ตรงเงื่อนไข</td></tr>';

    mobileList.innerHTML = rows.length ? rows.map(item => `
      <article class="donation-card">
        <h3>${item.is_anonymous ? 'ผู้ไม่ประสงค์เอ่ยนาม' : (item.donor_name || '-')}</h3>
        <div class="donation-meta">
          <div><strong>จำนวนเงิน:</strong> ${money(item.amount || 0)}</div>
          <div><strong>สถานะ:</strong> <span class="badge ${statusClass(item.payment_status)}">${item.payment_status || '-'}</span></div>
          <div><strong>สลิป:</strong> ${item.slip_url ? `<a class="link" href="#" data-slip="${item.slip_url}">ดูสลิป</a>` : '-'}</div>
        </div>
        <div class="action-row" style="margin-top:12px;">
          <button class="sm-btn approve" data-action="approve" data-id="${item.id}">อนุมัติ</button>
          <button class="sm-btn reject" data-action="reject" data-id="${item.id}">ปฏิเสธ</button>
        </div>
      </article>
    `).join('') : '<div class="empty">ไม่พบรายการที่ตรงเงื่อนไข</div>';

    bindRowActions();
  }

  async function updateDonation(id, payment_status){
    try{
      const res = await fetch(`/api/donations/${encodeURIComponent(id)}/status`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'same-origin',
        body: JSON.stringify({ payment_status })
      });
      if (!res.ok) throw new Error('request_failed');
      const json = await res.json();
      if (!(json.ok || json.success)) throw new Error(json.error || 'update_failed');
    }catch(_){
      state.rows = state.rows.map(item => String(item.id) === String(id) ? ({...item, payment_status}) : item);
    }
    render();
  }

  function openSlip(src){
    slipImage.src = src;
    modal.classList.add('open');
  }

  function bindRowActions(){
    document.querySelectorAll('[data-slip]').forEach(el => {
      el.onclick = (e) => { e.preventDefault(); openSlip(el.getAttribute('data-slip')); };
    });
    document.querySelectorAll('[data-action]').forEach(el => {
      el.onclick = () => updateDonation(el.getAttribute('data-id'), el.getAttribute('data-action') === 'approve' ? 'approved' : 'rejected');
    });
  }

  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('statusFilter').addEventListener('change', render);
  document.getElementById('slipFilter').addEventListener('change', render);
  document.getElementById('reloadBtn').addEventListener('click', loadRows);
  document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });

  loadRows();
})();
</script>
</body>
</html>
