<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War Room Card Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Prompt', sans-serif;
      background:
        radial-gradient(circle at top, rgba(35,87,107,.75), transparent 35%),
        radial-gradient(circle at bottom, rgba(255,81,0,.18), transparent 20%),
        linear-gradient(180deg, #0d1f29 0%, #04070d 100%);
      color: #fff;
    }

    .warroom-shell {
      width: min(100%, 430px);
      border-radius: 28px;
      padding: 18px 18px 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        linear-gradient(180deg, #0d1b28 0%, #05090f 100%);
      box-shadow:
        0 22px 50px rgba(0,0,0,.55),
        inset 0 0 0 1px rgba(255,255,255,.12),
        0 0 0 2px rgba(96, 196, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .warroom-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,214,102,.22), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255,102,0,.2), transparent 18%),
        radial-gradient(circle at 0% 50%, rgba(0,170,255,.15), transparent 18%),
        radial-gradient(circle at 100% 50%, rgba(255,70,70,.12), transparent 18%);
      pointer-events: none;
    }

    .title {
      position: relative;
      margin: 4px 0 18px;
      text-align: center;
      font-size: clamp(34px, 8vw, 56px);
      line-height: 0.95;
      font-weight: 800;
      color: #f8fbff;
      letter-spacing: -1px;
      text-shadow:
        0 2px 0 rgba(0,0,0,.55),
        0 6px 16px rgba(0,0,0,.35);
    }

    .card {
      position: relative;
      z-index: 1;
      background: #f5f5f5;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 14px 28px rgba(0,0,0,.35),
        inset 0 0 0 1px rgba(255,255,255,.65);
    }

    .card-header {
      background: linear-gradient(180deg, #ff2820 0%, #e90f0f 100%);
      color: #fff;
      text-align: center;
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 800;
      padding: 18px 16px 16px;
      text-shadow: 0 2px 8px rgba(0,0,0,.28);
    }

    .card-body {
      padding: 26px 24px 22px;
      color: #252525;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
      font-size: 18px;
      line-height: 1.35;
    }

    .label {
      min-width: 78px;
      color: #555;
    }

    .value {
      font-weight: 600;
      color: #202020;
      flex: 1;
    }

    .status {
      color: #e57b00;
      font-weight: 700;
    }

    .priority {
      color: #e11d1d;
      font-weight: 800;
    }

    .divider {
      height: 1px;
      background: #dedede;
      margin: 16px 0 14px;
      border: 0;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #555;
      font-size: 17px;
      margin-bottom: 14px;
    }

    .sla-box {
      background: linear-gradient(180deg, #ffffff, #f2f2f2);
      border-radius: 18px;
      padding: 14px 16px 16px;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.06),
        0 8px 18px rgba(0,0,0,.10);
    }

    .sla-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .sla-left {
      color: #d97706;
    }

    .percent {
      color: #202020;
      font-size: 18px;
      font-weight: 800;
    }

    .progress-track {
      height: 16px;
      border-radius: 999px;
      background: #7b7b62;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 5px rgba(0,0,0,.22);
    }

    .progress-bar {
      width: 60%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd000 0%, #c9f218 48%, #55d14f 100%);
      box-shadow: 0 0 12px rgba(255,214,10,.8);
      position: relative;
    }

    .progress-bar::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -8px;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: #fff67d;
      box-shadow: 0 0 14px rgba(255,230,0,.95);
    }

    .btn {
      display: block;
      width: calc(100% - 24px);
      margin: 16px auto 0;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-family: 'Prompt', sans-serif;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      text-shadow: 0 1px 3px rgba(0,0,0,.25);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.25),
        0 8px 18px rgba(0,0,0,.30);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.25),
        0 12px 22px rgba(0,0,0,.34);
    }

    .btn-track {
      background: linear-gradient(180deg, #138ca0 0%, #0c6f83 100%);
    }

    .btn-open {
      background: linear-gradient(180deg, #ff2018 0%, #d30a0a 100%);
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      text-align: center;
      color: rgba(255,255,255,.82);
      font-size: 12px;
      letter-spacing: .2px;
    }

    @media (max-width: 420px) {
      .card-body { padding: 22px 18px 18px; }
      .label { min-width: 64px; }
      .row { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="warroom-shell">
    <div class="title">ศูนย์ปฏิบัติการเคส</div>

    <section class="card">
      <div class="card-header" id="caseCodeText">กำลังโหลด...</div>
      <div class="card-body">
       <div class="row">
  <div class="label">ชื่อ:</div>
  <div class="value" id="caseFullName">-</div>
</div>

<div class="row">
  <div class="label">พื้นที่:</div>
  <div class="value" id="caseLocation">-</div>
</div>

<div class="row">
  <div class="label">สถานะ:</div>
  <div class="value status" id="caseStatus">-</div>
</div>

<div class="row">
  <div class="label">ระดับ:</div>
  <div class="value priority" id="casePriority">-</div>
</div>

<hr class="divider" />

<div class="meta">🕒 <span id="caseUpdatedAt">อัปเดตล่าสุด: -</span></div>

<div class="sla-box">
  <div class="sla-top">
    <div class="sla-left" id="caseSlaText">⚠ SLA: -</div>
    <div class="percent" id="caseProgressText">0%</div>
  </div>
  <div class="progress-track">
    <div class="progress-bar" id="caseProgressBar" style="width:0%"></div>
  </div>
</div>      </div>
    </section>

   <button class="btn btn-track" type="button" id="trackCaseBtn">ติดตามเคสนี้</button>
<button class="btn btn-open" type="button" id="openCommandBtn">เปิดศูนย์ปฏิบัติการ</button>

    <div class="footer">มูลนิธิคนช่วยฅน</div>
  </main>

<script>
(function () {
  const API_BASE = window.location.origin;

  const el = {
    caseCodeText: document.getElementById("caseCodeText"),
    caseFullName: document.getElementById("caseFullName"),
    caseLocation: document.getElementById("caseLocation"),
    caseStatus: document.getElementById("caseStatus"),
    casePriority: document.getElementById("casePriority"),
    caseUpdatedAt: document.getElementById("caseUpdatedAt"),
    caseSlaText: document.getElementById("caseSlaText"),
    caseProgressText: document.getElementById("caseProgressText"),
    caseProgressBar: document.getElementById("caseProgressBar"),
    trackCaseBtn: document.getElementById("trackCaseBtn"),
    openCommandBtn: document.getElementById("openCommandBtn")
  };

  let currentCaseCode = "";

  function getCaseCodeFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return (
      params.get("case_code") ||
      params.get("caseCode") ||
      params.get("case") ||
      ""
    ).trim();
  }

  function statusThai(status) {
    const s = String(status || "").toLowerCase().trim();
    if (s === "new") return "รับเรื่องแล้ว";
    if (s === "in_progress" || s === "in progress" || s === "progress") return "กำลังดำเนินการ";
    if (s === "done") return "เสร็จสิ้น";
    if (s === "cancelled" || s === "canceled") return "ยกเลิก";
    return status || "-";
  }

  function priorityThai(priority) {
    const p = String(priority || "").toLowerCase().trim();
    if (p === "urgent") return "ด่วน";
    if (p === "normal") return "ปกติ";
    return priority || "-";
  }

  function formatRelativeThai(dateValue) {
    if (!dateValue) return "-";
    const date = new Date(dateValue);
    if (isNaN(date.getTime())) return "-";

    const diffMs = Date.now() - date.getTime();
    const diffMin = Math.floor(diffMs / 60000);

    if (diffMin < 1) return "เมื่อสักครู่";
    if (diffMin < 60) return `${diffMin} นาทีที่แล้ว`;

    const diffHour = Math.floor(diffMin / 60);
    if (diffHour < 24) return `${diffHour} ชั่วโมงที่แล้ว`;

    const diffDay = Math.floor(diffHour / 24);
    return `${diffDay} วันที่แล้ว`;
  }

  function clampProgress(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return 0;
    return Math.max(0, Math.min(100, Math.round(n)));
  }

  function checkSla(caseItem) {
    const baseTime = caseItem.last_action_at || caseItem.updated_at || caseItem.created_at;
    if (!baseTime) return { level: "normal", text: "ปกติ" };

    const priority = String(caseItem.priority || "").toLowerCase();
    const baseMs = new Date(baseTime).getTime();
    if (!Number.isFinite(baseMs)) return { level: "normal", text: "ปกติ" };

    const diffHours = (Date.now() - baseMs) / (1000 * 60 * 60);

    if (priority === "urgent" && diffHours >= 4) {
      return { level: "breach", text: "เกินกำหนดแล้ว" };
    }

    if (priority === "urgent" && diffHours >= 2) {
      return { level: "warning", text: "ใกล้เกินกำหนด" };
    }

    return { level: "normal", text: "ปกติ" };
  }

  function applySlaStyle(slaLevel) {
    if (!el.caseSlaText || !el.caseProgressBar) return;

    if (slaLevel === "breach") {
      el.caseSlaText.textContent = "🚨 SLA: เกินกำหนดแล้ว";
      el.caseSlaText.style.color = "#dc2626";
      el.caseProgressBar.style.background = "linear-gradient(90deg, #ff7878 0%, #ef4444 100%)";
      el.caseProgressBar.style.boxShadow = "0 0 12px rgba(239,68,68,.65)";
      return;
    }

    if (slaLevel === "warning") {
      el.caseSlaText.textContent = "⚠ SLA: ใกล้เกินกำหนด";
      el.caseSlaText.style.color = "#d97706";
      el.caseProgressBar.style.background = "linear-gradient(90deg, #ffd000 0%, #c9f218 48%, #55d14f 100%)";
      el.caseProgressBar.style.boxShadow = "0 0 12px rgba(255,214,10,.8)";
      return;
    }

    el.caseSlaText.textContent = "✅ SLA: ปกติ";
    el.caseSlaText.style.color = "#16a34a";
    el.caseProgressBar.style.background = "linear-gradient(90deg, #86efac 0%, #22c55e 100%)";
    el.caseProgressBar.style.boxShadow = "0 0 10px rgba(34,197,94,.45)";
  }

  function applyCaseData(caseItem) {
    if (!caseItem) return;

    const caseCode = caseItem.case_code || currentCaseCode || "-";
    const fullName = caseItem.full_name || caseItem.name || "-";
    let location =
  caseItem.location ||
  caseItem.area ||
  caseItem.province ||
  caseItem.location_text ||
  "-";

const lat = caseItem.latitude;
const lng = caseItem.longitude;

if (
  (!location || location === "-" || String(location).includes(",")) &&
  lat && lng
) {
  location = `${lat}, ${lng}`;
}

    const status = statusThai(caseItem.status);
    const priority = priorityThai(caseItem.priority);
    const progress = clampProgress(
      caseItem.progress_percent ??
      caseItem.progress ??
      caseItem.percent ??
      0
    );
    const updatedAt =
      caseItem.last_action_at ||
      caseItem.updated_at ||
      caseItem.created_at ||
      null;
    const sla = checkSla(caseItem);

    if (el.caseCodeText) el.caseCodeText.textContent = caseCode;
    if (el.caseFullName) el.caseFullName.textContent = fullName;
    if (el.caseLocation) el.caseLocation.textContent = location;
    if (el.caseStatus) el.caseStatus.textContent = status;
    if (el.casePriority) el.casePriority.textContent = priority;
    if (el.caseUpdatedAt) el.caseUpdatedAt.textContent = `อัปเดตล่าสุด: ${formatRelativeThai(updatedAt)}`;
    if (el.caseProgressText) el.caseProgressText.textContent = `${progress}%`;
    if (el.caseProgressBar) el.caseProgressBar.style.width = `${progress}%`;

    applySlaStyle(sla.level);

    if (el.trackCaseBtn) {
      el.trackCaseBtn.onclick = function () {
        window.location.href = `/case.html?case_code=${encodeURIComponent(caseCode)}`;
      };
    }

    if (el.openCommandBtn) {
      el.openCommandBtn.onclick = function () {
        window.location.href = `/command-center.html?case_code=${encodeURIComponent(caseCode)}`;
      };
    }

    console.log("applyCaseData success:", caseItem);
  }

  async function fetchCaseData(caseCode) {
    const url = `${API_BASE}/api/help-requests/by-case-code/${encodeURIComponent(caseCode)}`;
    const res = await fetch(url, { cache: "no-store" });

    if (!res.ok) {
      throw new Error(`โหลดข้อมูลไม่สำเร็จ (${res.status})`);
    }

    const data = await res.json();
    return data?.data || data?.case || data?.item || data;
  }

  async function loadCaseCard() {
    try {
      if (!currentCaseCode) {
        if (el.caseCodeText) el.caseCodeText.textContent = "ไม่พบ case_code";
        return;
      }

      if (el.caseCodeText) el.caseCodeText.textContent = "กำลังโหลด...";
      const caseItem = await fetchCaseData(currentCaseCode);
      applyCaseData(caseItem);
    } catch (err) {
      console.error("loadCaseCard error:", err);
      if (el.caseCodeText) el.caseCodeText.textContent = currentCaseCode || "โหลดไม่สำเร็จ";
      if (el.caseFullName) el.caseFullName.textContent = "โหลดข้อมูลไม่ได้";
    }
  }

  function startRealtime() {
    try {
      const es = new EventSource(`${API_BASE}/api/stream`);

      es.onmessage = function (event) {
        try {
          const payload = JSON.parse(event.data || "{}");
          const payloadCaseCode =
            payload.case_code ||
            payload.caseCode ||
            payload.data?.case_code ||
            payload.data?.caseCode ||
            "";

          if (payloadCaseCode && payloadCaseCode === currentCaseCode) {
            loadCaseCard();
          }
        } catch (e) {
          console.warn("SSE parse warning:", e);
        }
      };

      es.onerror = function (err) {
        console.warn("SSE error:", err);
      };
    } catch (err) {
      console.warn("Realtime unavailable:", err);
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    currentCaseCode = getCaseCodeFromUrl();
    loadCaseCard();
    startRealtime();
  });
})();
</script>
  
</body>
</html>
