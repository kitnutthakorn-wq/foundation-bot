<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>หน้าบริจาค | Demo Safe</title>
<style>:root{--bg:#edf2f5;--card:#fff;--line:#dbe3ea;--text:#16324f;--muted:#6b7280;--brand:#1ea644;--blue:#2f64e3;--shadow:0 12px 30px rgba(18,36,58,.10)}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}.page{max-width:760px;margin:0 auto;padding:16px 12px 32px}.shell{background:var(--card);border-radius:26px;box-shadow:var(--shadow);padding:28px 28px 22px;border:1px solid rgba(219,227,234,.85)}.back{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:12px;background:var(--blue);color:#fff;text-decoration:none;font-weight:700;margin-bottom:18px}.title{text-align:center;font-size:26px;font-weight:800;line-height:1.3}.province{text-align:center;color:var(--muted);margin-top:10px;font-size:17px}.money{text-align:center;font-size:18px;margin-top:14px}.bar{height:18px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin:18px 0}.fill{height:100%;background:linear-gradient(90deg,#1fc64a,#19a841)}.section-title{text-align:center;font-size:18px;font-weight:800;margin:18px 0 12px}.presets{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}.preset{min-width:106px;min-height:42px;padding:0 16px;border:none;border-radius:12px;background:var(--brand);color:#fff;font-size:16px;font-weight:800;cursor:pointer}.field{margin-top:14px}.field input,.field textarea{width:100%;min-height:46px;border:1px solid #cfd8e3;border-radius:10px;padding:0 14px;font-size:16px;background:#fff}.field textarea{min-height:84px;padding-top:12px;resize:vertical}.apply{display:flex;justify-content:center;margin-top:12px}.apply button{min-width:130px;min-height:44px;border-radius:12px;border:1px solid var(--brand);background:#fff;color:var(--brand);font-size:16px;font-weight:800;cursor:pointer}.qr-wrap{text-align:center;margin:22px 0 10px}.qr-box{width:220px;height:220px;display:inline-flex;align-items:center;justify-content:center;background:#fff;border:10px solid #fff;box-shadow:0 0 0 1px #dfe6ef inset;font-weight:700;color:#475569;font-size:18px;text-align:center;padding:20px}.note{text-align:center;color:var(--muted);margin-top:8px;line-height:1.6}.checkbox-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;font-size:16px;flex-wrap:wrap}.submit-row{display:flex;justify-content:center;margin:20px 0}.submit-btn{min-width:120px;min-height:46px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:18px;font-weight:800;cursor:pointer}.recent{margin-top:24px;background:#fafcfe;border:1px solid var(--line);border-radius:18px;padding:16px}.recent h3{margin:0 0 12px;font-size:18px}.recent-item{padding:10px 0;border-top:1px solid #edf2f7}.recent-item:first-of-type{border-top:none}.message{display:none;margin-top:14px;padding:12px 14px;border-radius:12px;text-align:center}.message.show{display:block}.message.ok{background:#dcfce7;color:#166534}.message.err{background:#fee2e2;color:#b91c1c}@media (max-width:640px){.page{padding:10px 8px 20px}.shell{padding:18px 14px 16px}.title{font-size:22px}.province,.money{font-size:15px}.presets{gap:10px}.preset{min-width:95px;font-size:15px}.qr-box{width:200px;height:200px}}</style>
</head><body><div class="page"><div class="shell"><a class="back" id="backLink" href="donate-cases.html">← กลับไปหน้าเคส</a><div class="title" id="caseTitle">กำลังโหลดเคส</div><div class="province" id="provinceText">-</div><div class="money" id="moneyText">-</div><div class="bar"><div class="fill" id="fillBar" style="width:0%"></div></div><div class="section-title">เลือกจำนวนเงิน</div><div class="presets" id="presetButtons"></div><div class="section-title" style="margin-top:6px;">หรือระบุจำนวนเงินด้วยตนเอง</div><div class="field"><input id="amountInput" type="number" min="1" placeholder="ระบุจำนวนเงิน เช่น 1500"></div><div class="apply"><button id="applyAmountBtn">ใช้ยอดนี้</button></div><div class="qr-wrap"><div id="qrFallback" class="qr-box">QR Demo<br>พร้อมพรีเซ็น</div><div class="note">สแกน QR เพื่อโอนเงิน<br>โอนแล้วกรอกข้อมูลด้านล่าง</div></div><form id="donationForm"><div class="field"><input id="donorName" name="donor_name" type="text" placeholder="ชื่อผู้บริจาค" /></div><div class="checkbox-row"><input id="anonymousCheck" name="is_anonymous" type="checkbox" /><label for="anonymousCheck">ไม่ประสงค์เอ่ยนาม</label></div><div class="field"><input id="amountConfirm" name="amount" type="number" min="1" placeholder="จำนวนเงิน" required /></div><div class="field"><input id="slipInput" name="slip" type="file" accept="image/*" /></div><div class="field"><textarea id="noteInput" name="note" placeholder="หมายเหตุ (ถ้ามี)"></textarea></div><div class="submit-row"><button class="submit-btn" type="submit">ส่งข้อมูล</button></div><div id="formMessage" class="message"></div></form><div class="recent"><h3>ผู้บริจาคล่าสุดของเคสนี้</h3><div id="recentList"></div></div></div></div>
<script>
const DATA = {
  housing: { cases:{
    'house-01': {title:'ซ่อมแซมบ้านครอบครัวผู้สูงอายุ', province:'สุราษฎร์ธานี', raised_amount:120000, target_amount:250000, recent:[['คุณอารียา',5000],['ไม่ประสงค์ออกนาม',12000],['คุณสมชาย',3000]]},
    'house-02': {title:'สร้างห้องนอนปลอดภัยให้เด็กเล็ก', province:'นครศรีธรรมราช', raised_amount:85000, target_amount:180000, recent:[['บริษัทผู้สนับสนุน',25000],['คุณมานพ',1500]]},
    'house-03': {title:'ปรับปรุงหลังคาบ้านผู้ป่วยติดเตียง', province:'พัทลุง', raised_amount:40000, target_amount:120000, recent:[['คุณสายฝน',2000],['ไม่ประสงค์ออกนาม',500]]}
  }},
  education: { cases:{
    'edu-01': {title:'ทุนเรียนต่อระดับมัธยม', province:'ยะลา', raised_amount:35000, target_amount:60000, recent:[['คุณวรัญญา',1000],['ไม่ประสงค์ออกนาม',3000]]},
    'edu-02': {title:'ค่าอุปกรณ์การเรียนเด็กกำพร้า', province:'ปัตตานี', raised_amount:22000, target_amount:45000, recent:[['ครอบครัวใจดี',5000]]},
    'edu-03': {title:'ทุนเดินทางและอาหารกลางวัน', province:'นราธิวาส', raised_amount:18000, target_amount:50000, recent:[['คุณพิมพ์ชนก',2000],['คุณอารี',1000]]}
  }},
  zakat: { cases:{
    'zakat-01': {title:'มอบซากาตช่วยครอบครัวผู้ยากไร้', province:'สงขลา', raised_amount:42000, target_amount:100000, recent:[['ผู้มีจิตศรัทธา',4000],['ไม่ประสงค์ออกนาม',7000]]},
    'zakat-02': {title:'ช่วยเหลือผู้สูงอายุและแม่หม้าย', province:'ปัตตานี', raised_amount:30000, target_amount:80000, recent:[['คุณอับดุลเลาะห์',3000]]},
    'zakat-03': {title:'กองทุนยังชีพตามหลักซากาต', province:'นราธิวาส', raised_amount:15000, target_amount:70000, recent:[['คุณฟาตีมะห์',2500]]}
  }},
  transport: { cases:{
    'transport-01': {title:'ช่วยค่าเดินทางกลับภูมิลำเนา', province:'กรุงเทพฯ', raised_amount:18000, target_amount:45000, recent:[['ผู้สนับสนุน',2000]]},
    'transport-02': {title:'ส่งต่อเคสตกค้างให้ถึงบ้านอย่างปลอดภัย', province:'หาดใหญ่', raised_amount:25000, target_amount:60000, recent:[['คุณสมหมาย',3500]]},
    'transport-03': {title:'ค่าน้ำมันและค่ารถรับส่งเด็ก', province:'ยะลา', raised_amount:12000, target_amount:35000, recent:[['คุณมาเรียม',1500]]}
  }},
  relief: { cases:{
    'relief-01': {title:'ถุงยังชีพช่วยผู้ประสบเหตุฉุกเฉิน', province:'ชุมพร', raised_amount:50000, target_amount:120000, recent:[['คุณกิตติ',5000]]},
    'relief-02': {title:'กู้ชีพและสนับสนุนภาคสนาม', province:'สุราษฎร์ธานี', raised_amount:64000, target_amount:150000, recent:[['กลุ่มเพื่อนช่วยกัน',8000]]},
    'relief-03': {title:'เครื่องอุปโภคบริโภคเร่งด่วน', province:'พัทลุง', raised_amount:22000, target_amount:70000, recent:[['คุณแสงดาว',1200]]}
  }},
  disaster: { cases:{
    'disaster-01': {title:'ช่วยผู้ประสบอุทกภัยระยะเร่งด่วน', province:'น่าน', raised_amount:70000, target_amount:160000, recent:[['คุณวรชัย',6000]]},
    'disaster-02': {title:'ฟื้นฟูชีวิตหลังน้ำลด', province:'เชียงราย', raised_amount:33000, target_amount:90000, recent:[['ไม่ประสงค์ออกนาม',3000]]},
    'disaster-03': {title:'สนับสนุนอาหารและสิ่งจำเป็น', province:'ตรัง', raised_amount:21000, target_amount:65000, recent:[['คุณสุภา',2500]]}
  }},
  orphan: { cases:{
    'orphan-01': {title:'ทุนยังชีพเด็กกำพร้า', province:'ยะลา', raised_amount:26000, target_amount:70000, recent:[['ผู้มีเมตตา',2000]]},
    'orphan-02': {title:'ชุดนักเรียนและอุปกรณ์การเรียน', province:'ปัตตานี', raised_amount:19000, target_amount:50000, recent:[['คุณอามีนะห์',1500]]},
    'orphan-03': {title:'ดูแลค่าอาหารและการเดินทาง', province:'นราธิวาส', raised_amount:14000, target_amount:45000, recent:[['คุณอาลี',1800]]}
  }}
};
(function(){
  const params = new URLSearchParams(location.search);
  const projectSlug = params.get('project') || 'housing';
  const caseId = params.get('caseId') || '';
  const project = DATA[projectSlug];
  const item = project && project.cases[caseId];
  const backLink = document.getElementById('backLink');
  backLink.href = `donate-cases.html?project=${encodeURIComponent(projectSlug)}`;

  function setAmount(value){ document.getElementById('amountInput').value = value || ''; document.getElementById('amountConfirm').value = value || ''; }
  document.getElementById('applyAmountBtn').addEventListener('click', () => setAmount(document.getElementById('amountInput').value));

  if (!item) {
    document.getElementById('caseTitle').textContent = 'ไม่พบเคส';
    document.getElementById('recentList').innerHTML = '<div class="recent-item">ไม่พบข้อมูลเคสที่เลือก</div>';
    return;
  }

  const percent = Math.max(0, Math.min(100, Math.round((Number(item.raised_amount||0)/Math.max(Number(item.target_amount||0),1))*100)));
  document.getElementById('caseTitle').textContent = item.title;
  document.getElementById('provinceText').textContent = item.province;
  document.getElementById('moneyText').textContent = `ช่วยแล้ว ${Number(item.raised_amount).toLocaleString('th-TH')} / ${Number(item.target_amount).toLocaleString('th-TH')} บาท (${percent}%)`;
  document.getElementById('fillBar').style.width = `${percent}%`;
  document.getElementById('presetButtons').innerHTML = [100,300,500,1000].map(v => `<button class="preset" type="button" data-value="${v}">บริจาค ${v}</button>`).join('');
  document.querySelectorAll('.preset').forEach(btn => btn.addEventListener('click', ()=>setAmount(btn.dataset.value)));
  document.getElementById('recentList').innerHTML = item.recent.map(row => `<div class="recent-item"><strong>${row[0]}</strong> — ${Number(row[1]).toLocaleString('th-TH')} บาท</div>`).join('');

  document.getElementById('donationForm').addEventListener('submit', function(e){
    e.preventDefault();
    const amount = Number(document.getElementById('amountConfirm').value || 0);
    const donorName = document.getElementById('anonymousCheck').checked ? 'ผู้ไม่ประสงค์ออกนาม' : (document.getElementById('donorName').value || 'ผู้บริจาค');
    if (!amount || amount <= 0) {
      const msg = document.getElementById('formMessage');
      msg.className = 'message show err';
      msg.textContent = 'กรุณาระบุจำนวนเงินให้ถูกต้อง';
      return;
    }
    const msg = document.getElementById('formMessage');
    msg.className = 'message show ok';
    msg.textContent = `รับข้อมูลการบริจาคแบบ Demo เรียบร้อย: ${donorName} จำนวน ${amount.toLocaleString('th-TH')} บาท`;
    item.recent.unshift([donorName, amount]);
    item.raised_amount += amount;
    document.getElementById('recentList').innerHTML = item.recent.slice(0,5).map(row => `<div class="recent-item"><strong>${row[0]}</strong> — ${Number(row[1]).toLocaleString('th-TH')} บาท</div>`).join('');
    const newPercent = Math.max(0, Math.min(100, Math.round((Number(item.raised_amount||0)/Math.max(Number(item.target_amount||0),1))*100)));
    document.getElementById('moneyText').textContent = `ช่วยแล้ว ${Number(item.raised_amount).toLocaleString('th-TH')} / ${Number(item.target_amount).toLocaleString('th-TH')} บาท (${newPercent}%)`;
    document.getElementById('fillBar').style.width = `${newPercent}%`;
    e.target.reset();
    setAmount('');
  });
})();
</script></body></html>
