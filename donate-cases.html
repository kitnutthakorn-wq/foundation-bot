<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เลือกเคสบริจาค | Demo Safe</title>
<style>:root{--bg:#edf2f5;--card:#fff;--line:#dbe3ea;--text:#16324f;--muted:#6b7280;--brand:#1ea644;--blue:#2f64e3;--shadow:0 12px 30px rgba(18,36,58,.10)}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}.page{max-width:1100px;margin:0 auto;padding:20px 16px 36px}.top{text-align:center;margin-bottom:20px}.back{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:12px;background:var(--blue);color:#fff;text-decoration:none;font-weight:700;margin-bottom:18px}h1{margin:0;font-size:28px}.sub{margin-top:10px;color:var(--muted);font-size:16px}.list{display:grid;gap:16px}.case-card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);border:1px solid rgba(219,227,234,.85);padding:20px}.tag{display:inline-flex;padding:7px 12px;border-radius:999px;background:#eef2ff;color:#2f46cc;font-size:13px;font-weight:700;margin-bottom:12px}.case-title{font-size:20px;font-weight:800;margin-bottom:10px}.money{font-size:16px;margin-bottom:12px}.bar{height:16px;border-radius:999px;background:#e5e7eb;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#19a84a,#18a43f)}.actions{margin-top:14px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 18px;border:none;border-radius:12px;background:var(--brand);color:#fff;text-decoration:none;font-weight:800}.empty{padding:22px;text-align:center;color:var(--muted)}@media (max-width:640px){.page{padding:14px 12px 28px}h1{font-size:24px}.case-card{padding:16px}.case-title{font-size:18px}.money{font-size:15px}}</style>
</head><body><div class="page"><div class="top"><a class="back" href="donate-projects.html">← กลับไปหน้าโครงการ</a><h1 id="projectTitle">กำลังโหลดโครงการ</h1><div class="sub">เลือกเคสที่ต้องการร่วมช่วยเหลือ</div></div><div class="list" id="caseList"></div></div>
<script>
const DATA = {
  housing: { title:'สร้างที่อยู่อาศัยเพื่อผู้ยากไร้', items:[
    {id:'house-01', province:'สุราษฎร์ธานี', title:'ซ่อมแซมบ้านครอบครัวผู้สูงอายุ', raised_amount:120000, target_amount:250000},
    {id:'house-02', province:'นครศรีธรรมราช', title:'สร้างห้องนอนปลอดภัยให้เด็กเล็ก', raised_amount:85000, target_amount:180000},
    {id:'house-03', province:'พัทลุง', title:'ปรับปรุงหลังคาบ้านผู้ป่วยติดเตียง', raised_amount:40000, target_amount:120000}
  ]},
  education: { title:'เพื่อการศึกษา', items:[
    {id:'edu-01', province:'ยะลา', title:'ทุนเรียนต่อระดับมัธยม', raised_amount:35000, target_amount:60000},
    {id:'edu-02', province:'ปัตตานี', title:'ค่าอุปกรณ์การเรียนเด็กกำพร้า', raised_amount:22000, target_amount:45000},
    {id:'edu-03', province:'นราธิวาส', title:'ทุนเดินทางและอาหารกลางวัน', raised_amount:18000, target_amount:50000}
  ]},
  zakat: { title:'ซากาตเพื่อผู้ยากไร้', items:[
    {id:'zakat-01', province:'สงขลา', title:'มอบซากาตช่วยครอบครัวผู้ยากไร้', raised_amount:42000, target_amount:100000},
    {id:'zakat-02', province:'ปัตตานี', title:'ช่วยเหลือผู้สูงอายุและแม่หม้าย', raised_amount:30000, target_amount:80000},
    {id:'zakat-03', province:'นราธิวาส', title:'กองทุนยังชีพตามหลักซากาต', raised_amount:15000, target_amount:70000}
  ]},
  transport: { title:'อาสาพาน้องกลับบ้าน', items:[
    {id:'transport-01', province:'กรุงเทพฯ', title:'ช่วยค่าเดินทางกลับภูมิลำเนา', raised_amount:18000, target_amount:45000},
    {id:'transport-02', province:'หาดใหญ่', title:'ส่งต่อเคสตกค้างให้ถึงบ้านอย่างปลอดภัย', raised_amount:25000, target_amount:60000},
    {id:'transport-03', province:'ยะลา', title:'ค่าน้ำมันและค่ารถรับส่งเด็ก', raised_amount:12000, target_amount:35000}
  ]},
  relief: { title:'เพื่อการบรรเทาธารณภัย', items:[
    {id:'relief-01', province:'ชุมพร', title:'ถุงยังชีพช่วยผู้ประสบเหตุฉุกเฉิน', raised_amount:50000, target_amount:120000},
    {id:'relief-02', province:'สุราษฎร์ธานี', title:'กู้ชีพและสนับสนุนภาคสนาม', raised_amount:64000, target_amount:150000},
    {id:'relief-03', province:'พัทลุง', title:'เครื่องอุปโภคบริโภคเร่งด่วน', raised_amount:22000, target_amount:70000}
  ]},
  disaster: { title:'ช่วยเหลือผู้ประสบภัย', items:[
    {id:'disaster-01', province:'น่าน', title:'ช่วยผู้ประสบอุทกภัยระยะเร่งด่วน', raised_amount:70000, target_amount:160000},
    {id:'disaster-02', province:'เชียงราย', title:'ฟื้นฟูชีวิตหลังน้ำลด', raised_amount:33000, target_amount:90000},
    {id:'disaster-03', province:'ตรัง', title:'สนับสนุนอาหารและสิ่งจำเป็น', raised_amount:21000, target_amount:65000}
  ]},
  orphan: { title:'ช่วยเหลือเด็กกำพร้า', items:[
    {id:'orphan-01', province:'ยะลา', title:'ทุนยังชีพเด็กกำพร้า', raised_amount:26000, target_amount:70000},
    {id:'orphan-02', province:'ปัตตานี', title:'ชุดนักเรียนและอุปกรณ์การเรียน', raised_amount:19000, target_amount:50000},
    {id:'orphan-03', province:'นราธิวาส', title:'ดูแลค่าอาหารและการเดินทาง', raised_amount:14000, target_amount:45000}
  ]}
};
(function(){
  const params = new URLSearchParams(location.search);
  const projectSlug = params.get('project') || 'housing';
  const titleEl = document.getElementById('projectTitle');
  const list = document.getElementById('caseList');
  const formatMoney = n => Number(n || 0).toLocaleString('th-TH');
  const project = DATA[projectSlug];
  if (!project) {
    titleEl.textContent = 'ไม่พบโครงการ';
    list.innerHTML = '<div class="case-card">ไม่พบข้อมูลโครงการที่เลือก</div>';
    return;
  }
  titleEl.textContent = project.title;
  list.innerHTML = project.items.map(item => {
    const percent = Math.max(0, Math.min(100, Math.round((Number(item.raised_amount||0) / Math.max(Number(item.target_amount||0),1)) * 100)));
    return `<article class="case-card"><div class="tag">${item.province}</div><div class="case-title">${item.title}</div><div class="money">ช่วยแล้ว ${formatMoney(item.raised_amount)} / ${formatMoney(item.target_amount)} บาท (${percent}%)</div><div class="bar"><div class="fill" style="width:${percent}%"></div></div><div class="actions"><a class="btn" href="donate-form.html?project=${encodeURIComponent(projectSlug)}&caseId=${encodeURIComponent(item.id)}">บริจาคเคสนี้</a></div></article>`;
  }).join('');
})();
</script></body></html>
