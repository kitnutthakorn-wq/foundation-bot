<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดเคสภาคสนาม</title>

  <style>
    body{
      font-family: system-ui;
      background:#f5f7fa;
      margin:0;
      padding:20px;
    }

    .container{
      max-width:900px;
      margin:auto;
      display:grid;
      gap:16px;
    }

    .card{
      background:#fff;
      border-radius:14px;
      padding:16px;
      border:1px solid #e5e7eb;
    }

    h2{margin:0 0 10px}

    .meta{
      color:#6b7280;
      font-size:14px;
    }

    .timeline{
      display:grid;
      gap:12px;
    }

    .item{
      border-left:4px solid #0b7c86;
      padding-left:12px;
    }

    .img{
      max-width:100%;
      border-radius:8px;
      cursor:pointer;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    button{
      padding:8px 12px;
      border-radius:8px;
      border:1px solid #ddd;
      cursor:pointer;
    }

    .status{
      font-weight:bold;
      color:#0b7c86;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <button onclick="goBack()">⬅ กลับ</button>
    <div id="status">กำลังโหลด...</div>
  </div>

  <div class="card">
    <h2 id="caseCode">-</h2>
    <div class="meta" id="summary">-</div>
  </div>

  <div class="card">
    <h2>Timeline ภาคสนาม</h2>
    <div id="timeline" class="timeline"></div>
  </div>

</div>

<script>
const API = "https://foundation-bot-p5wu.onrender.com";

let caseCode = "";
let eventSource = null;

// ---------------------------
// โหลดข้อมูลเคส
// ---------------------------
async function loadCase(){
  try{
    const res = await fetch(`${API}/api/team/case-detail?case_code=${caseCode}`);
    const data = await res.json();

    if(!data.ok) throw new Error(data.error);

    render(data.case, data.updates);

  }catch(err){
    alert("โหลดข้อมูลไม่สำเร็จ: " + err.message);
  }
}

// ---------------------------
// render
// ---------------------------
function render(caseItem, updates){

  document.getElementById("caseCode").textContent = caseItem.case_code;

  document.getElementById("summary").textContent =
    `${caseItem.full_name || "-"} | ${caseItem.location || "-"} | ${caseItem.status || "-"}`;

  const root = document.getElementById("timeline");

  if(!updates.length){
    root.innerHTML = "<div>ยังไม่มีข้อมูล</div>";
    return;
  }

  root.innerHTML = updates.map(u => `
    <div class="item">
      <div><b>${u.updater_name || "-"}</b></div>
      <div class="meta">${formatTime(u.updated_at)}</div>
      <div>${u.latest_note || u.message || "-"}</div>

      ${
        (u.images || []).map(img =>
          `<img src="${img}" class="img" onclick="openImg('${img}')">`
        ).join("")
      }

    </div>
  `).join("");
}

// ---------------------------
// realtime (เฉพาะเคสนี้)
// ---------------------------
function connectRealtime(){
  eventSource = new EventSource(`${API}/api/team/stream`);

  eventSource.addEventListener("case_update", handleEvent);
  eventSource.addEventListener("case_updated", handleEvent);
  eventSource.addEventListener("recent_activity_refresh", handleEvent);
}

async function handleEvent(e){
  try{
    const payload = JSON.parse(e.data || "{}");

    if(payload.case_code === caseCode){
      document.getElementById("status").textContent = "กำลังซิงก์...";
      await loadCase();
      document.getElementById("status").textContent = "อัปเดตล่าสุดแล้ว";
    }
  }catch{}
}

// ---------------------------
// helper
// ---------------------------
function formatTime(t){
  if(!t) return "-";
  return new Date(t).toLocaleString("th-TH");
}

function openImg(src){
  window.open(src, "_blank");
}

function goBack(){
  history.back();
}

// ---------------------------
// start
// ---------------------------
function init(){
  const url = new URL(window.location.href);
  caseCode = url.searchParams.get("case_code");

  if(!caseCode){
    alert("ไม่พบ case_code");
    return;
  }

  loadCase();
  connectRealtime();
}

init();

</script>
</body>
</html>
