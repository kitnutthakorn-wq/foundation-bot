<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Live Map KCK_FD Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    :root {
      --brand: #0b7c86;
      --brand-dark: #163c72;
      --bg: #edf2f5;
      --card: #ffffff;
      --line: #dbe3ea;
      --text: #0f172a;
      --muted: #64748b;
      --urgent: #dc2626;
      --high: #ea580c;
      --normal: #2563eb;
      --low: #6b7280;
      --success: #16a34a;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.10);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    body { overflow: hidden; }
    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: 100vh;
    }
    .sidebar {
      background: linear-gradient(180deg, #f8fbfc 0%, #eef5f7 100%);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .sidebar-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand-dark);
      margin: 0 0 4px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }
    .controls {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    input, select, button {
      width: 100%;
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 12px;
      font: inherit;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    button {
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background-color .18s ease;
      box-shadow: 0 6px 16px rgba(15,23,42,.06);
    }
    button:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: white;
      border: none;
    }
    .btn-secondary {
      background: white;
      color: var(--brand-dark);
    }
    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 999px; background: #cbd5e1;
      display: inline-block;
    }
    .dot.live { background: var(--success); box-shadow: 0 0 0 8px rgba(22,163,74,.10); }
    .dot.warn { background: var(--high); }
    .case-list {
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .case-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .case-card:hover { transform: translateY(-2px); }
    .case-card.active {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12), var(--shadow);
    }
    .case-card.flash {
      animation: pulseGlow 1.3s ease-in-out 2;
    }
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(37,99,235,.0), var(--shadow); }
      50% { box-shadow: 0 0 0 8px rgba(37,99,235,.16), var(--shadow); }
      100% { box-shadow: 0 0 0 0 rgba(37,99,235,.0), var(--shadow); }
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .case-code {
      font-weight: 800;
      color: var(--brand-dark);
      font-size: 14px;
      word-break: break-word;
    }
    .case-name {
      margin-top: 4px;
      font-size: 13px;
      color: var(--text);
    }
    .case-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .02em;
    }
    .urgent { background: var(--urgent); }
    .high { background: var(--high); }
    .normal { background: var(--normal); }
    .low { background: var(--low); }
    .status {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .status-chip {
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .status-new { background: #ecfeff; color: #0891b2; }
    .status-in_progress { background: #eff6ff; color: #1d4ed8; }
    .status-done { background: #ecfdf5; color: #059669; }
    .status-cancelled { background: #fef2f2; color: #dc2626; }
    .time-text {
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }
    .map-wrap {
      position: relative;
      min-width: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .topbar {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 700;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .glass {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 10px 12px;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
    }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(16px);
      z-index: 800;
      background: rgba(15,23,42,.92);
      color: white;
      padding: 12px 16px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .legend {
      display: grid;
      gap: 6px;
    }
    .legend-item {
      display: flex; gap: 8px; align-items: center;
      font-size: 12px; color: var(--muted);
    }
    .swatch {
      width: 12px; height: 12px; border-radius: 999px;
    }
    .leaflet-popup-content {
      min-width: 240px;
      line-height: 1.45;
    }
    .popup-title {
      font-weight: 800;
      color: var(--brand-dark);
      margin-bottom: 8px;
      font-size: 14px;
    }
    .popup-grid {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--text);
      margin-bottom: 10px;
    }
    .popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .popup-actions button {
      min-height: 34px;
      border-radius: 10px;
      padding: 0 10px;
      border: 1px solid var(--line);
      box-shadow: none;
    }
    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 70vh;
        height: auto;
        min-height: 100vh;
      }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
      .topbar {
        left: 12px;
        right: 12px;
        top: 12px;
      }
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="title">🗺️ แผนที่แสดงที่อยู่เคสงานช่วยเหลือ มูลนิธิคนช่วยฅน </h1>
        <p class="subtitle">Realtime SSE Map + Highlight Motion PRO</p>
        <div class="controls">
          <input id="searchInput" type="text" placeholder="ค้นหาเลขเคส / ชื่อ / พื้นที่" />
          <div class="row">
            <select id="statusFilter">
              <option value="">ทุกสถานะ</option>
              <option value="new">รับเรื่องแล้ว</option>
              <option value="in_progress">กำลังดำเนินการ</option>
              <option value="done">เสร็จสิ้นแล้ว</option>
              <option value="cancelled">ยกเลิก</option>
            </select>
            <select id="priorityFilter">
              <option value="">ทุกระดับ</option>
              <option value="urgent">ด่วน</option>
              <option value="high">สูง</option>
              <option value="normal">ปกติ</option>
              <option value="low">ต่ำ</option>
            </select>
          </div>
          <div class="row">
            <select id="sortBy">
              <option value="updated_desc">อัปเดตล่าสุด</option>
              <option value="priority_desc">ระดับความเร่งด่วน</option>
              <option value="code_asc">เลขเคส A-Z</option>
            </select>
            <button id="refreshBtn" class="btn-secondary" type="button">รีเฟรชข้อมูล</button>
          </div>
          <div class="row">
            <button id="fitAllBtn" class="btn-primary" type="button">แสดงทุกหมุด</button>
            <button id="clearFocusBtn" class="btn-secondary" type="button">ล้างการโฟกัส</button>
          </div>
        </div>
        <div class="meta">
          <span class="dot" id="liveDot"></span>
          <span id="liveText">กำลังเชื่อมต่อ...</span>
          <span>•</span>
          <span id="caseCount">0 เคส</span>
        </div>
      </div>
      <div id="caseList" class="case-list"></div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div class="topbar">
        <div class="glass legend">
          <div class="legend-item"><span class="swatch urgent"></span><span>Urgent</span></div>
          <div class="legend-item"><span class="swatch high"></span><span>High</span></div>
          <div class="legend-item"><span class="swatch normal"></span><span>Normal</span></div>
          <div class="legend-item"><span class="swatch low"></span><span>Low</span></div>
        </div>
        <div class="glass" id="apiBaseBox"></div>
      </div>
      <div id="toast" class="toast"></div>
    </main>
  </div>

  <script>
    (() => {
      const qs = new URLSearchParams(window.location.search);
      const focusCaseCode = qs.get("case_code") || "";

      const RAILWAY_BASE = "https://satisfied-stillness-production-7942.up.railway.app";
      const DEFAULT_API_BASE =
        qs.get('apiBase') ||
        window.__API_BASE__ ||
        localStorage.getItem('foundation_api_base') ||
        RAILWAY_BASE;

      const API_BASE = String(DEFAULT_API_BASE || '').replace(/\/$/, '');
      const API_URL = `${API_BASE}/api/cases/map`;
      const STREAM_URL = `${API_BASE}/api/team/stream`;
      const CASE_URL_BASE = `${API_BASE}/case`;

      try {
        localStorage.setItem('foundation_api_base', API_BASE);
      } catch(e) {}

      console.log("✅ API BASE LOCKED:", API_BASE);

      const map = L.map('map', {
        zoomControl: true,
        minZoom: 3
      }).setView([9.14, 99.33], 6);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        minZoom: 3,
        maxZoom: 18,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const markerLayer = L.layerGroup().addTo(map);
      const markersByCase = new Map();
      let allItems = [];
      let filteredItems = [];
      let selectedCaseCode = '';
      let stream = null;
      let pollTimer = null;
      let reconnectTimer = null;
      let toastTimer = null;

      const els = {
        caseList: document.getElementById('caseList'),
        caseCount: document.getElementById('caseCount'),
        searchInput: document.getElementById('searchInput'),
        statusFilter: document.getElementById('statusFilter'),
        priorityFilter: document.getElementById('priorityFilter'),
        sortBy: document.getElementById('sortBy'),
        refreshBtn: document.getElementById('refreshBtn'),
        fitAllBtn: document.getElementById('fitAllBtn'),
        clearFocusBtn: document.getElementById('clearFocusBtn'),
        liveDot: document.getElementById('liveDot'),
        liveText: document.getElementById('liveText'),
        apiBaseBox: document.getElementById('apiBaseBox'),
        toast: document.getElementById('toast')
      };

      els.apiBaseBox.textContent = `API: ${API_BASE}`;

      function showToast(message) {
        if (!message) return;
        els.toast.textContent = message;
        els.toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          els.toast.classList.remove('show');
        }, 2200);
      }

      function priorityRank(priority) {
        const value = String(priority || '').toLowerCase();
        if (value === 'urgent') return 4;
        if (value === 'high') return 3;
        if (value === 'normal') return 2;
        return 1;
      }

      function priorityClass(priority) {
        const value = String(priority || '').toLowerCase();
        if (value === 'urgent') return 'urgent';
        if (value === 'high') return 'high';
        if (value === 'normal') return 'normal';
        return 'low';
      }

      function normalizeStatus(status) {
        const s = String(status || '').trim().toLowerCase();
        if (s === 'progress') return 'in_progress';
        if (['new', 'in_progress', 'done', 'cancelled'].includes(s)) return s;
        return 'new';
      }

      function statusThai(status) {
        const value = normalizeStatus(status);
        if (value === 'new') return 'รับเรื่องแล้ว';
        if (value === 'in_progress') return 'กำลังดำเนินการ';
        if (value === 'done') return 'เสร็จสิ้นแล้ว';
        if (value === 'cancelled') return 'ยกเลิก';
        return status || '-';
      }

      function priorityThai(priority) {
        const value = String(priority || '').toLowerCase();
        if (value === 'urgent') return 'ด่วน';
        if (value === 'high') return 'สูง';
        if (value === 'normal') return 'ปกติ';
        if (value === 'low') return 'ต่ำ';
        return priority || '-';
      }

      function formatDateTime(value) {
        if (!value) return '-';
        try {
          return new Date(value).toLocaleString('th-TH', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
        } catch (err) {
          return value;
        }
      }

      function markerColor(priority) {
        const value = String(priority || '').toLowerCase();
        if (value === 'urgent') return '#dc2626';
        if (value === 'high') return '#ea580c';
        if (value === 'normal') return '#2563eb';
        return '#6b7280';
      }

      function normalizeItem(item) {
        return {
          id: item?.id ?? null,
          case_code: String(item?.case_code || '').trim(),
          full_name: String(item?.full_name || '-').trim() || '-',
          phone: String(item?.phone || '-').trim() || '-',
          location: String(item?.location || '').trim(),
          problem: String(item?.problem || '').trim(),
          assigned_to: String(item?.assigned_to || '').trim(),
          status: normalizeStatus(item?.status),
          priority: String(item?.priority || 'normal').trim() || 'normal',
          latitude: Number(item?.latitude),
          longitude: Number(item?.longitude),
          location_text: String(item?.location_text || '').trim(),
          latest_note: String(item?.latest_note || '').trim(),
          updated_at: item?.updated_at || null
        };
      }

      function hasValidGeo(item) {
        return Number.isFinite(item.latitude) && Number.isFinite(item.longitude);
      }

      function markerRadius(priority) {
        const value = String(priority || '').toLowerCase();
        if (value === 'urgent') return 9;
        if (value === 'high') return 8;
        return 7;
      }

      function buildPopup(item) {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = `
          <div class="popup-title">${item.case_code || '-'}</div>
          <div class="popup-grid">
            <div>👤 ${item.full_name}</div>
            <div>📌 สถานะ: ${statusThai(item.status)}</div>
            <div>⚡ ระดับ: ${priorityThai(item.priority)}</div>
            <div>📍 ${item.location_text || item.location || '-'}</div>
            <div>🕒 ${formatDateTime(item.updated_at)}</div>
            <div>📝 ${item.latest_note || item.problem || '-'}</div>
          </div>
        `;

        const actions = document.createElement('div');
        actions.className = 'popup-actions';

        const detailBtn = document.createElement('button');
        detailBtn.textContent = 'ดูรายละเอียด';
        detailBtn.addEventListener('click', () => openCase(item.case_code));

        const focusBtn = document.createElement('button');
        focusBtn.textContent = 'โฟกัสเคส';
        focusBtn.addEventListener('click', () => focusCase(item.case_code));

        actions.appendChild(detailBtn);
        actions.appendChild(focusBtn);
        wrapper.appendChild(actions);
        return wrapper;
      }

      function renderMarkers() {
        markerLayer.clearLayers();
        markersByCase.clear();

        filteredItems.forEach((item) => {
          if (!hasValidGeo(item)) return;

          const marker = L.circleMarker([item.latitude, item.longitude], {
            radius: markerRadius(item.priority),
            color: markerColor(item.priority),
            fillColor: markerColor(item.priority),
            fillOpacity: 0.88,
            weight: selectedCaseCode === item.case_code ? 4 : 2,
            opacity: 0.98
          });

          marker.bindPopup(buildPopup(item));
          marker.on('click', () => selectCase(item.case_code, true));
          marker.addTo(markerLayer);
          markersByCase.set(item.case_code, marker);
        });
      }

      function renderList() {
        els.caseList.innerHTML = '';
        els.caseCount.textContent = `${filteredItems.length} เคส`;

        if (!filteredItems.length) {
          const empty = document.createElement('div');
          empty.className = 'case-card';
          empty.innerHTML = '<div class="case-code">ยังไม่มีเคสที่ตรงเงื่อนไข</div><div class="case-note">ลองล้าง filter หรือส่งพิกัดจากมือถือเข้าระบบอีกครั้ง</div>';
          els.caseList.appendChild(empty);
          return;
        }

        filteredItems.forEach((item) => {
          const card = document.createElement('div');
          card.className = 'case-card' + (selectedCaseCode === item.case_code ? ' active' : '');
          card.dataset.caseCode = item.case_code;
          card.innerHTML = `
            <div class="card-top">
              <div>
                <div class="case-code">${item.case_code || '-'}</div>
                <div class="case-name">${item.full_name}</div>
              </div>
              <span class="pill ${priorityClass(item.priority)}">${priorityThai(item.priority)}</span>
            </div>
            <div class="status">
              <span class="status-chip status-${item.status}">${statusThai(item.status)}</span>
              <span class="status-chip">${item.location_text || item.location || 'ไม่มีตำแหน่งข้อความ'}</span>
            </div>
            <div class="case-note">${item.latest_note || item.problem || 'ยังไม่มีรายละเอียดเพิ่มเติม'}</div>
            <div class="time-text">อัปเดตล่าสุด: ${formatDateTime(item.updated_at)}</div>
          `;
          card.addEventListener('click', () => selectCase(item.case_code, true));
          els.caseList.appendChild(card);
        });
      }

      function applyFilters() {
        const search = String(els.searchInput.value || '').trim().toLowerCase();
        const status = String(els.statusFilter.value || '').trim().toLowerCase();
        const priority = String(els.priorityFilter.value || '').trim().toLowerCase();
        const sortBy = String(els.sortBy.value || 'updated_desc');

        filteredItems = allItems.filter((item) => {
          const haystack = [
            item.case_code,
            item.full_name,
            item.location,
            item.location_text,
            item.problem,
            item.latest_note
          ].join(' ').toLowerCase();

          if (search && !haystack.includes(search)) return false;
          if (status && String(item.status).toLowerCase() !== status) return false;
          if (priority && String(item.priority).toLowerCase() !== priority) return false;
          return true;
        });

        filteredItems.sort((a, b) => {
          if (sortBy === 'priority_desc') {
            return priorityRank(b.priority) - priorityRank(a.priority) ||
              String(b.updated_at || '').localeCompare(String(a.updated_at || ''));
          }
          if (sortBy === 'code_asc') {
            return String(a.case_code || '').localeCompare(String(b.case_code || ''));
          }
          return String(b.updated_at || '').localeCompare(String(a.updated_at || ''));
        });

        renderMarkers();
        renderList();
      }

      function selectCase(caseCode, flyTo = false) {
        selectedCaseCode = caseCode || '';
        applyFilters();

        document.querySelectorAll('.case-card').forEach((card) => {
          card.classList.toggle('active', card.dataset.caseCode === selectedCaseCode);
        });

        if (!selectedCaseCode) return;

        const marker = markersByCase.get(selectedCaseCode);
        if (marker) {
          if (flyTo) {
            map.flyTo(marker.getLatLng(), Math.max(map.getZoom(), 14), { duration: 0.9 });
          }
          marker.openPopup();
        }
      }

      function focusCaseByCode(code) {
        if (!code) return;

        const found =
          (filteredItems || []).find((x) => x.case_code === code) ||
          (allItems || []).find((x) => x.case_code === code);

        if (!found) return;
        if (!hasValidGeo(found)) return;

        selectCase(found.case_code, true);
      }

      function fitAllMarkers() {
        const latLngs = filteredItems
          .filter(hasValidGeo)
          .map((item) => [item.latitude, item.longitude]);

        if (!latLngs.length) return;

        if (latLngs.length === 1) {
          map.flyTo(latLngs[0], 12, { duration: 0.9 });
          return;
        }

        map.fitBounds(latLngs, {
          paddingTopLeft: [60, 60],
          paddingBottomRight: [60, 60],
          maxZoom: 13
        });
      }

      function flashCase(caseCode) {
        const card = document.querySelector(`.case-card[data-case-code="${CSS.escape(caseCode)}"]`);
        if (card) {
          card.classList.remove('flash');
          void card.offsetWidth;
          card.classList.add('flash');
        }
      }

      function mergeItems(items) {
        const nextMap = new Map(allItems.map((item) => [item.case_code, item]));
        items.forEach((raw) => {
          const item = normalizeItem(raw);
          if (!item.case_code || !hasValidGeo(item)) return;
          nextMap.set(item.case_code, { ...nextMap.get(item.case_code), ...item });
        });
        allItems = Array.from(nextMap.values());
        applyFilters();
      }

      async function loadMapData({ silent = false } = {}) {
        try {
          const res = await fetch(API_URL, { headers: { Accept: 'application/json' } });
          const json = await res.json();
          if (!json?.ok) throw new Error(json?.error || 'load failed');

          const unique = new Map();
          (json.items || []).forEach((raw) => {
            const item = normalizeItem(raw);
            if (!item.case_code || !hasValidGeo(item)) return;
            unique.set(item.case_code, item);
          });

          allItems = Array.from(unique.values());
          applyFilters();

          if (!silent) {
            showToast(`โหลดข้อมูลแล้ว ${allItems.length} เคส`);
          }

          if (focusCaseCode) {
            focusCaseByCode(focusCaseCode);
          } else if (allItems.length && !selectedCaseCode) {
            fitAllMarkers();
          }

          setLiveState('polling');
        } catch (err) {
          console.error('loadMapData error:', err);
          setLiveState('warn', 'เชื่อมต่อไม่สำเร็จ ใช้โหมด polling');
          if (!silent) {
            showToast('โหลดข้อมูลไม่สำเร็จ');
          }
        }
      }

      function setLiveState(mode, customText = '') {
        els.liveDot.classList.remove('live', 'warn');
        if (mode === 'live') {
          els.liveDot.classList.add('live');
          els.liveText.textContent = customText || 'Realtime SSE ทำงาน';
          return;
        }
        if (mode === 'warn') {
          els.liveDot.classList.add('warn');
          els.liveText.textContent = customText || 'ใช้ polling สำรอง';
          return;
        }
        els.liveText.textContent = customText || 'กำลังเชื่อมต่อ...';
      }

      function startPolling() {
        clearInterval(pollTimer);
        pollTimer = setInterval(() => {
          loadMapData({ silent: true });
        }, 8000);
      }

      function connectStream() {
        if (!window.EventSource) {
          setLiveState('warn', 'เบราว์เซอร์ไม่รองรับ SSE');
          startPolling();
          return;
        }

        try {
          stream?.close?.();
          stream = new EventSource(STREAM_URL);
        } catch (err) {
          console.error('SSE init error:', err);
          setLiveState('warn', 'เปิด SSE ไม่สำเร็จ');
          startPolling();
          return;
        }

        stream.addEventListener('connected', () => {
          setLiveState('live');
          clearTimeout(reconnectTimer);
        });

        stream.addEventListener('heartbeat', () => {
          setLiveState('live');
        });

        stream.addEventListener('case_update', (event) => {
          try {
            const payload = JSON.parse(event.data || '{}');
            const item = payload?.item;
            if (!item?.case_code) return;
            mergeItems([item]);
            flashCase(item.case_code);
            showToast(`อัปเดตเคส ${item.case_code} แล้ว`);
          } catch (err) {
            console.error('case_update parse error:', err);
          }
        });

        stream.addEventListener('case_geo_updated', (event) => {
          try {
            const payload = JSON.parse(event.data || '{}');
            const item = payload?.item;
            if (!item?.case_code) return;
            mergeItems([item]);
            flashCase(item.case_code);
            showToast(`พิกัดเคส ${item.case_code} อัปเดตแล้ว`);
          } catch (err) {
            console.error('case_geo_updated parse error:', err);
          }
        });

        stream.onerror = () => {
          setLiveState('warn', 'SSE หลุด ใช้ polling สำรอง');
          stream?.close?.();
          startPolling();
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(() => {
            connectStream();
          }, 5000);
        };
      }

      function openCase(caseCode) {
        if (!caseCode) return;
        window.open(`${CASE_URL_BASE}?id=${encodeURIComponent(caseCode)}`, '_blank');
      }

      function focusCase(code) {
        selectCase(code, true);
      }

      window.__openCase = openCase;
      window.__focusCase = focusCase;

      els.searchInput.addEventListener('input', applyFilters);
      els.statusFilter.addEventListener('change', applyFilters);
      els.priorityFilter.addEventListener('change', applyFilters);
      els.sortBy.addEventListener('change', applyFilters);
      els.refreshBtn.addEventListener('click', () => loadMapData());
      els.fitAllBtn.addEventListener('click', fitAllMarkers);
      els.clearFocusBtn.addEventListener('click', () => {
        selectedCaseCode = '';
        applyFilters();
        fitAllMarkers();
      });

      loadMapData().then(() => {
        startPolling();
        connectStream();
      });
    })();
  </script>
</body>
</html>
