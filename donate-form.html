<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หน้าบริจาค | Golden ProMax</title>
  <script src="mock-data.js"></script>
  <style>
    :root{--bg:#edf2f5;--card:#fff;--line:#dbe3ea;--text:#16324f;--muted:#6b7280;--brand:#1ea644;--blue:#2f64e3;--shadow:0 12px 30px rgba(18,36,58,.10);--radius:24px}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .page{max-width:760px;margin:0 auto;padding:16px 12px 32px}.shell{background:var(--card);border-radius:26px;box-shadow:var(--shadow);padding:28px 28px 22px;border:1px solid rgba(219,227,234,.85)}
    .back{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:12px;background:var(--blue);color:#fff;text-decoration:none;font-weight:700;margin-bottom:18px}
    .title{text-align:center;font-size:26px;font-weight:800;line-height:1.3}.province{text-align:center;color:var(--muted);margin-top:10px;font-size:17px}.money{text-align:center;font-size:18px;margin-top:14px}.bar{height:18px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin:18px 0}.fill{height:100%;background:linear-gradient(90deg,#1fc64a,#19a841)}
    .section-title{text-align:center;font-size:18px;font-weight:800;margin:18px 0 12px}.presets{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}.preset{min-width:106px;min-height:42px;padding:0 16px;border:none;border-radius:12px;background:var(--brand);color:#fff;font-size:16px;font-weight:800;cursor:pointer}
    .field{margin-top:14px}.field input,.field textarea{width:100%;min-height:46px;border:1px solid #cfd8e3;border-radius:10px;padding:0 14px;font-size:16px;background:#fff}.field textarea{min-height:84px;padding-top:12px;resize:vertical}
    .apply{display:flex;justify-content:center;margin-top:12px}.apply button{min-width:130px;min-height:44px;border-radius:12px;border:1px solid var(--brand);background:#fff;color:var(--brand);font-size:16px;font-weight:800;cursor:pointer}
    .qr-wrap{text-align:center;margin:22px 0 10px}.qr{width:220px;height:220px;border:10px solid #fff;box-shadow:0 0 0 1px #dfe6ef inset;background:#fff}.note{text-align:center;color:var(--muted);margin-top:8px;line-height:1.6}
    .checkbox-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;font-size:16px;flex-wrap:wrap}.submit-row{display:flex;justify-content:center;margin:20px 0}.submit-btn{min-width:120px;min-height:46px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:18px;font-weight:800;cursor:pointer}
    .recent{margin-top:24px;background:#fafcfe;border:1px solid var(--line);border-radius:18px;padding:16px}.recent h3{margin:0 0 12px;font-size:18px}.recent-item{padding:10px 0;border-top:1px solid #edf2f7}.recent-item:first-of-type{border-top:none}
    @media (max-width:640px){.page{padding:10px 8px 20px}.shell{padding:18px 14px 16px}.title{font-size:22px}.province,.money{font-size:15px}.presets{gap:10px}.preset{min-width:95px;font-size:15px}.qr{width:200px;height:200px}}
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <a class="back" id="backLink" href="donate-cases.html">← กลับไปหน้าเคส</a>
      <div class="title" id="caseTitle">กำลังโหลดเคส</div>
      <div class="province" id="provinceText">-</div>
      <div class="money" id="moneyText">-</div>
      <div class="bar"><div class="fill" id="fillBar" style="width:0%"></div></div>

      <div class="section-title">เลือกจำนวนเงิน</div>
      <div class="presets" id="presetButtons"></div>

      <div class="section-title" style="margin-top:6px;">หรือระบุจำนวนเงินด้วยตนเอง</div>
      <div class="field"><input id="amountInput" type="number" min="1" placeholder="ระบุจำนวนเงิน เช่น 1500"></div>
      <div class="apply"><button id="applyAmountBtn">ใช้ยอดนี้</button></div>

      <div class="qr-wrap">
        <div style="font-size:18px;font-weight:700;margin-bottom:10px;">สแกน QR เพื่อโอนเงิน</div>
        <img class="qr" id="qrImage" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=KHONCHUAYKHON-DONATION" alt="qr" />
        <div class="note">โอนแล้วกรอกข้อมูลด้านล่าง</div>
      </div>

      <div class="field"><input id="donorName" type="text" placeholder="ชื่อผู้บริจาค"></div>
      <div class="checkbox-row">
        <input id="anonymousCheck" type="checkbox">
        <label for="anonymousCheck">ไม่ประสงค์เอ่ยนาม</label>
      </div>
      <div class="field"><input id="amountReadOnly" type="text" readonly placeholder="จำนวนเงิน"></div>
      <div class="field"><input id="slipUpload" type="file" accept="image/*"></div>
      <div class="submit-row"><button class="submit-btn" id="submitBtn" type="button">ส่งข้อมูล</button></div>

      <div class="recent">
        <h3>ผู้บริจาคล่าสุดของเคสนี้</h3>
        <div id="recentList"></div>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const projectSlug = params.get('project') || 'housing';
    const caseId = params.get('case') || 'narathiwat-home-001';
    const project = (window.DONATION_PROJECTS || []).find(p => p.slug === projectSlug) || window.DONATION_PROJECTS[0];
    const caseItem = ((window.DONATION_CASES || {})[projectSlug] || []).find(c => c.id === caseId) || ((window.DONATION_CASES || {})[projectSlug] || [])[0];
    const recent = (window.DONATION_RECENT || {})[caseId] || (window.DONATION_RECENT || {})['narathiwat-home-001'] || [];
    const presets = window.DONATION_PRESETS || [100,300,500];
    const formatMoney = n => Number(n || 0).toLocaleString('th-TH');
    const percent = Math.max(0, Math.min(100, Math.round((caseItem.raised_amount / caseItem.target_amount) * 100)));
    document.getElementById('backLink').href = `donate-cases.html?project=${encodeURIComponent(projectSlug)}`;
    document.getElementById('caseTitle').textContent = caseItem.title;
    document.getElementById('provinceText').textContent = caseItem.province;
    document.getElementById('moneyText').textContent = `ช่วยแล้ว ${formatMoney(caseItem.raised_amount)} / ${formatMoney(caseItem.target_amount)} บาท (${percent}%)`;
    document.getElementById('fillBar').style.width = `${percent}%`;
    document.getElementById('amountReadOnly').value = '';
    document.getElementById('presetButtons').innerHTML = presets.map(v => `<button class="preset" data-amount="${v}">บริจาค ${v}</button>`).join('');
    document.querySelectorAll('.preset').forEach(btn => btn.addEventListener('click', () => {
      document.getElementById('amountInput').value = btn.dataset.amount;
      document.getElementById('amountReadOnly').value = btn.dataset.amount;
    }));
    document.getElementById('applyAmountBtn').addEventListener('click', () => {
      document.getElementById('amountReadOnly').value = document.getElementById('amountInput').value || '';
    });
    document.getElementById('anonymousCheck').addEventListener('change', (e) => {
      if (e.target.checked) document.getElementById('donorName').value = 'ผู้ไม่ประสงค์เอ่ยนาม';
      else if (document.getElementById('donorName').value === 'ผู้ไม่ประสงค์เอ่ยนาม') document.getElementById('donorName').value = '';
    });
    document.getElementById('submitBtn').addEventListener('click', () => {
      alert('Phase 1 Prototype: หน้านี้ยังไม่เชื่อมระบบจริง\nขั้นถัดไปค่อยเชื่อม DB / server.js / dashboard อย่างปลอดภัย');
    });
    document.getElementById('recentList').innerHTML = recent.map(item => `
      <div class="recent-item"><strong>${item.donor_name}</strong> — ${formatMoney(item.amount)} บาท</div>
    `).join('') || '<div class="recent-item">ยังไม่มีรายการบริจาคล่าสุด</div>';
  </script>
</body>
</html>
